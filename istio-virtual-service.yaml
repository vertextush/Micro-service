apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: main-app-virtualservice
  namespace: back
spec:
  hosts:
  - "*"
  gateways:
  - main-gateway
  http:
    # 1. User Service Routing
    - match:
      - uri:
          prefix: /api/users
      route:
      - destination:
          host: user-service
          port:
            number: 3001

    # 2. Dashboard Service Routing
    - match:
      - uri:
          prefix: /api/dashboard
      route:
      - destination:
          host: dashboard-service
          port:
            number: 3002

    # 3. Settings Service Routing
    - match:
      - uri:
          prefix: /api/settings
      route:
      - destination:
          host: settings-service
          port:
            number: 3003

    # 4. Catch-all for Frontend
    - match:
      - uri:
          prefix: /
      route:
      - destination:
          host: frontend-proxy
          port:
            number: 80
